services:
  - type: web
    name: concrete-takeoff-copilot-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL_FAST
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_MODEL_STRONG
        value: claude-sonnet-4-6
      - key: ENABLE_SONNET_FALLBACK
        value: "true"
      - key: ENABLE_PROMPT_CACHE
        value: "true"
      - key: PDF_DPI_FAST
        value: "200"
      - key: PDF_DPI_STRONG
        value: "250"
      - key: CORS_ORIGINS
        value: https://frontend-sable-three-96.vercel.app
